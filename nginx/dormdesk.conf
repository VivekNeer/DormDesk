# DormDesk Nginx Configuration
# File: nginx/dormdesk.conf
# Deploy to: /etc/nginx/sites-available/dormdesk

server {
    listen 80;
    server_name _;   # matches any hostname / IP address

    # ──────────────────────────────────────────────
    # FRONTEND — Serve React Production Build
    # ──────────────────────────────────────────────
    root  /var/www/html/dormdesk;
    index index.html;

    location / {
        # SPA fallback: if file not found, serve index.html
        # This lets React Router handle client-side navigation
        try_files $uri $uri/ /index.html;
    }

    # ──────────────────────────────────────────────
    # BACKEND — Reverse Proxy to Docker Container
    # ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }
}
